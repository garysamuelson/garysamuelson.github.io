  <rect x="848" y="323" width="145"  height="72"  class="task t-plat" rx="5"/>
  <text x="920" y="342" class="snum">PLATFORM</text>
  <text x="920" y="361" class="sname">Apply Optimizations</text>
  <text x="920" y="379" class="ssub">Bids · Budgets · Creatives</text>


  <!-- ═══════════════════════════════════════════════════════
       POOL 4 — AI ADVISOR   (y=434, h=100)
       Step: 10
       ═══════════════════════════════════════════════════════ -->
  <rect x="10"  y="434" width="1080" height="100" class="pool pool-adv" rx="6"/>
  <rect x="10"  y="434" width="32"   height="100" class="tab-adv" rx="6"/>
  <rect x="26"  y="434" width="16"   height="100" class="tab-adv"/>
  <text x="26"  y="489" class="tab-text"  transform="rotate(-90,26,489)">AI ADVISOR</text>

  <!-- Step 10 -->
  <rect x="477" y="457" width="145"  height="65"  class="task t-adv" rx="5"/>
  <text x="549" y="475" class="snum">STEP 10</text>
  <text x="549" y="494" class="sname">Advisor Playbook</text>
  <text x="549" y="511" class="ssub">Course Corrections · Narratives</text>

</svg>
