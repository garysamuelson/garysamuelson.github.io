<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" width="100%" height="550">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
      .pool        { stroke-width: 2; }
      .pool-brand  { fill: #e0f2fe; stroke: #0284c7; }
      .pool-agency { fill: #dcfce7; stroke: #16a34a; }
      .pool-plat   { fill: #ede9fe; stroke: #7c3aed; }
      .pool-adv    { fill: #fce7f3; stroke: #db2777; }
      .tab-brand   { fill: #0284c7; }
      .tab-agency  { fill: #16a34a; }
      .tab-plat    { fill: #7c3aed; }
      .tab-adv     { fill: #db2777; }
      .tab-text    { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; }
      .task        { fill: #fff; stroke-width: 1.8; }
      .t-brand     { stroke: #0284c7; }
      .t-agency    { stroke: #16a34a; }
      .t-plat      { stroke: #7c3aed; }
      .t-adv       { stroke: #db2777; }
      .snum        { font-size: 9px; font-weight: 700; fill: #94a3b8; text-anchor: middle; letter-spacing: 0.5px; }
      .sname       { font-size: 12px; font-weight: 700; fill: #1e293b; text-anchor: middle; }
      .ssub        { font-size: 10px; fill: #64748b; text-anchor: middle; }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       POOL 1 — BRAND TEAM   (y=20, h=125)
