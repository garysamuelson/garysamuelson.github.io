  <rect x="143" y="323" width="145"  height="72"  class="task t-plat" rx="5"/>
  <text x="215" y="342" class="snum">STEP 5</text>
  <text x="215" y="361" class="sname">Campaign Launch</text>
  <text x="215" y="379" class="ssub">DSP · Real-Time Bidding</text>

  <!-- Step 7 -->
  <rect x="378" y="323" width="145"  height="72"  class="task t-plat" rx="5"/>
  <text x="450" y="342" class="snum">STEP 7</text>
  <text x="450" y="361" class="sname">Ingest Telemetry</text>
  <text x="450" y="379" class="ssub">CTV · Social · Search · Retail</text>

  <!-- Step 8 -->
  <rect x="613" y="323" width="145"  height="72"  class="task t-plat" rx="5"/>
  <text x="685" y="342" class="snum">STEP 8</text>
  <text x="685" y="361" class="sname">Compute Attribution</text>
