  <rect x="10"  y="20"  width="32"   height="125" class="tab-brand" rx="6"/>
  <rect x="26"  y="20"  width="16"   height="125" class="tab-brand"/>
  <text x="26"  y="83"  class="tab-text"  transform="rotate(-90,26,83)">BRAND TEAM</text>

  <!-- Step 1 -->
  <rect x="201" y="47"  width="145"  height="72"  class="task t-brand" rx="5"/>
  <text x="273" y="66"  class="snum">STEP 1</text>
  <text x="273" y="85"  class="sname">Campaign Kickoff</text>
  <text x="273" y="103" class="ssub">Objective · Budget · ROAS</text>

  <!-- Step 6 -->
  <rect x="477" y="47"  width="145"  height="72"  class="task t-brand" rx="5"/>
  <text x="549" y="66"  class="snum">STEP 6</text>
  <text x="549" y="85"  class="sname">Dashboard Review</text>
  <text x="549" y="103" class="ssub">Spend · ROAS · Affordances</text>

  <!-- Step 9 -->
  <rect x="753" y="47"  width="145"  height="72"  class="task t-brand" rx="5"/>
  <text x="825" y="66"  class="snum">STEP 9</text>
  <text x="825" y="85"  class="sname">Execute Optimizations</text>
  <text x="825" y="103" class="ssub">Budget · Creative · Bids</text>


