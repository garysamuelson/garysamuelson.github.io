<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA"/>
      <stop offset="100%" style="stop-color:#E8EAF6"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3F51B5"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2F1"/>
      <stop offset="100%" style="stop-color:#B2DFDB"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="115%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arr-down" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0,8 3,0 6" fill="#1A237E"/>
    </marker>
    <marker id="arr-up" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="8 0,0 3,8 6" fill="#1A237E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Subtle background grid/pattern for "linked" feel -->
  <path d="M 0 100 L 1200 100 M 0 200 L 1200 200 M 0 300 L 1200 300 M 0 400 L 1200 400 M 0 500 L 1200 500 M 0 600 L 1200 600" stroke="#1A237E" stroke-width="0.5" opacity="0.05"/>
  <path d="M 200 0 L 200 630 M 400 0 L 400 630 M 600 0 L 600 630 M 800 0 L 800 630 M 1000 0 L 1000 630" stroke="#1A237E" stroke-width="0.5" opacity="0.05"/>

  <!-- ================= LEFT SIDE: TEXT & BRANDING ================= -->
  <g transform="translate(60, 0)">
    <!-- Overline -->
    <rect x="0" y="110" width="310" height="32" rx="4" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
    <text x="155" y="132" text-anchor="middle" font-size="14" font-weight="bold" fill="#3F51B5" letter-spacing="1">SEMANTIC PROCESS INTELLIGENCE</text>

    <!-- Main Titles -->
    <text x="0" y="210" font-size="44" font-weight="900" fill="#1A237E" letter-spacing="-1">When Processes Finally</text>
    <text x="0" y="265" font-size="44" font-weight="900" fill="#1A237E" letter-spacing="-1">Talk to Each Other</text>
    
    <!-- Subtitle -->
    <text x="0" y="340" font-size="28" font-weight="bold" fill="#4A148C">MCP as the Agentic Bridge</text>
    <text x="0" y="380" font-size="20" fill="#444">How Camunda 8.9 &amp; Model Context Protocol transform</text>
    <text x="0" y="410" font-size="20" fill="#444">process engines into AI-native orchestration infrastructure.</text>

    <!-- Author block -->
    <g transform="translate(0, 480)">
      <circle cx="20" cy="20" r="20" fill="#BBDEFB" stroke="#0D4372" stroke-width="2"/>
      <text x="20" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D4372">GS</text>
      <text x="55" y="16" font-size="16" font-weight="bold" fill="#222">Gary Samuelson</text>
      <text x="55" y="36" font-size="14" fill="#666">BPM &amp; Enterprise Architecture</text>
    </g>
  </g>

  <!-- ================= RIGHT SIDE: THE 3-LAYER SANDWICH ================= -->
  <!-- Shifted slightly upward to center vertically against 630 height -->
  <g transform="translate(680, 80)">
    
    <!-- Top Layer: AI Agent -->
    <rect x="0" y="0" width="460" height="110" rx="8" fill="url(#agentGrad)" stroke="#6A1B9A" stroke-width="3" filter="url(#shadow)"/>
    <text x="230" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A148C">AI-Enabled Process Agent</text>
    
    <rect x="20" y="45" width="200" height="45" rx="6" fill="#fff" stroke="#7B1FA2" stroke-width="1.5" opacity="0.95"/>
    <text x="120" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">LLM Reasoning Core</text>

    <rect x="240" y="45" width="200" height="45" rx="6" fill="#fff" stroke="#00897B" stroke-width="1.5" opacity="0.95"/>
    <text x="340" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695C">Domain Ontology</text>

    <!-- Connecting Lines -->
    <line x1="230" y1="110" x2="230" y2="180" stroke="#1A237E" stroke-width="4" marker-end="url(#arr-down)" marker-start="url(#arr-up)"/>
    <rect x="180" y="135" width="100" height="20" rx="4" fill="#fff" opacity="0.9"/>
    <text x="230" y="149" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A237E">MCP Client</text>

    <!-- Middle Layer: MCP Bridge -->
    <rect x="-20" y="180" width="500" height="80" rx="8" fill="url(#mcpGrad)" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
    <text x="230" y="215" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" letter-spacing="1">CAMUNDA 8.9 MCP GATEWAY</text>
    <text x="230" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#C5CAE9">DISCOVER &#x2022; GOVERN &#x2022; ACT &#x2022; OBSERVE</text>

    <!-- Connecting Lines -->
    <line x1="230" y1="260" x2="230" y2="330" stroke="#1A237E" stroke-width="4" marker-end="url(#arr-down)" marker-start="url(#arr-up)"/>
    <rect x="160" y="285" width="140" height="20" rx="4" fill="#fff" opacity="0.9"/>
    <text x="230" y="299" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A237E">Ambient Coordination</text>

    <!-- Bottom Layer: Process Engine -->
    <rect x="0" y="330" width="460" height="110" rx="8" fill="url(#engineGrad)" stroke="#00695C" stroke-width="3" filter="url(#shadow)"/>
    <text x="230" y="360" text-anchor="middle" font-size="16" font-weight="bold" fill="#004D40">Process Engine State</text>
    
    <rect x="20" y="375" width="200" height="45" rx="6" fill="#fff" stroke="#00897B" stroke-width="1.5" opacity="0.95"/>
    <text x="120" y="403" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695C">Running Instances</text>

    <rect x="240" y="375" width="200" height="45" rx="6" fill="#fff" stroke="#00897B" stroke-width="1.5" opacity="0.95"/>
    <text x="340" y="403" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695C">Cluster Variables</text>
    
  </g>

</svg>