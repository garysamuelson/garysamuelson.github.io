<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <!-- Background -->
  <rect width="800" height="300" fill="#f8fafc" rx="8"/>
  
  <!-- Header -->
  <rect width="800" height="50" fill="#0f172a" rx="8" />
  <path d="M 0 42 h 800 v 8 h -800 Z" fill="#0f172a" />
  <text x="24" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
    Bounty Q3 Campaign — Week 1 Summary
  </text>
  <text x="650" y="32" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">
    Static View
  </text>

  <!-- KPI Cards Row 1 -->
  <g transform="translate(24, 70)">
    <rect width="170" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="16" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">IMPRESSIONS</text>
    <text x="16" y="65" font-family="Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold">29.4M</text>
  </g>
  
  <g transform="translate(214, 70)">
    <rect width="170" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="16" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">CLICKS</text>
    <text x="16" y="65" font-family="Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold">412K</text>
  </g>

  <g transform="translate(404, 70)">
    <rect width="170" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="16" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">CTR</text>
    <text x="16" y="65" font-family="Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold">1.4%</text>
  </g>

  <g transform="translate(594, 70)">
    <rect width="182" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="16" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">SPEND (WTD)</text>
    <text x="16" y="65" font-family="Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold">$1.38M</text>
    <text x="16" y="80" font-family="Arial, sans-serif" font-size="11" fill="#ef4444">Budget Rem: $16.62M</text>
  </g>

  <!-- Metrics Row 2 -->
  <g transform="translate(24, 180)">
    <rect width="360" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="16" y="24" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">CHANNEL ENGAGEMENTS</text>
    <circle cx="20" cy="46" r="4" fill="#3b82f6" />
    <text x="32" y="50" font-family="Arial, sans-serif" font-size="14" fill="#334155">CTV Completions:</text>
    <text x="280" y="50" font-family="Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="bold">1.3M</text>
    
    <circle cx="20" cy="71" r="4" fill="#8b5cf6" />
    <text x="32" y="75" font-family="Arial, sans-serif" font-size="14" fill="#334155">Social Engagements:</text>
    <text x="280" y="75" font-family="Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="bold">294K</text>
  </g>

  <g transform="translate(404, 180)">
    <rect width="372" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="16" y="24" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">DIRECT RESPONSE</text>
    
    <circle cx="20" cy="46" r="4" fill="#f59e0b" />
    <text x="32" y="50" font-family="Arial, sans-serif" font-size="14" fill="#334155">Search Clicks:</text>
    <text x="280" y="50" font-family="Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="bold">61K</text>
    
    <circle cx="20" cy="71" r="4" fill="#ec4899" />
    <text x="32" y="75" font-family="Arial, sans-serif" font-size="14" fill="#334155">Retail Media Clicks:</text>
    <text x="280" y="75" font-family="Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="bold">89K</text>
  </g>
